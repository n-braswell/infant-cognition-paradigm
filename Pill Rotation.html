<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pill Rotation — Flipbook</title>
<style>
  :root{
    --bg:#16181d; --panel:#1f2228; --panel2:#272b33; --line:#33373f;
    --ink:#eef0f3; --muted:#9aa1ad; --accent:#f2c200; --accent2:#e23b2e;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100%;
    padding:32px;
  }
  .app{
    width:min(560px,100%);
    display:flex; flex-direction:column; gap:20px;
  }
  header{display:flex; align-items:baseline; justify-content:space-between; gap:12px;}
  h1{font-size:15px; font-weight:600; letter-spacing:.02em; margin:0;}
  .sub{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums;}

  .stage-wrap{
    position:relative;
    border-radius:var(--radius);
    border:1px solid var(--line);
    background:
      linear-gradient(45deg,#1a1c22 25%,transparent 25%,transparent 75%,#1a1c22 75%),
      linear-gradient(45deg,#1a1c22 25%,#202229 25%,#202229 75%,#1a1c22 75%);
    background-size:28px 28px; background-position:0 0,14px 14px;
    aspect-ratio:1145/1614;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .stage-wrap img{
    position:absolute; inset:0; margin:auto;
    max-width:88%; max-height:88%;
    image-rendering:auto;
    opacity:0; pointer-events:none;
    filter:drop-shadow(0 18px 30px rgba(0,0,0,.45));
  }
  .stage-wrap img.on{opacity:1;}

  .row{display:flex; align-items:center; gap:14px;}
  .controls{display:flex; flex-direction:column; gap:16px;}

  /* scrubber */
  .scrub{display:flex; flex-direction:column; gap:8px;}
  input[type=range]{
    -webkit-appearance:none; appearance:none; width:100%; height:6px;
    background:var(--panel2); border-radius:999px; outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
    background:var(--ink); border:3px solid var(--bg); box-shadow:0 0 0 1px var(--line); cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:18px;height:18px;border-radius:50%;background:var(--ink);border:3px solid var(--bg);cursor:pointer;
  }
  .ticks{display:flex; justify-content:space-between; font-size:10.5px; color:var(--muted); font-variant-numeric:tabular-nums;}

  .btn{
    appearance:none; border:1px solid var(--line); background:var(--panel);
    color:var(--ink); border-radius:10px; padding:9px 14px; font-size:13px; font-weight:500;
    cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition:background .12s,border-color .12s;
    user-select:none;
  }
  .btn:hover{background:var(--panel2);}
  .btn.icon{width:42px; justify-content:center; padding:9px 0;}
  .btn.primary{background:var(--ink); color:#15171c; border-color:var(--ink);}
  .btn.primary:hover{background:#fff;}
  .btn[aria-pressed=true]{border-color:var(--accent); color:var(--accent);}

  .seg{display:inline-flex; border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .seg button{appearance:none; border:0; background:var(--panel); color:var(--muted); padding:9px 16px; font-size:13px; font-weight:600; cursor:pointer;}
  .seg button[aria-pressed=true]{color:#15171c;}
  .seg button.y[aria-pressed=true]{background:var(--accent);}
  .seg button.r[aria-pressed=true]{background:var(--accent2); color:#fff;}

  .spacer{flex:1;}
  .field{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted);}
  select{background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:6px 8px; font-size:12px;}
  .read{font-variant-numeric:tabular-nums; font-size:12px; color:var(--muted);}
  .read b{color:var(--ink); font-weight:600;}
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Pill rotation · 180° flipbook</h1>
      <div class="sub" id="readout">frame 000 · 0°</div>
    </header>

    <div class="stage-wrap" id="stage"></div>

    <div class="controls">
      <div class="scrub">
        <input type="range" id="slider" min="0" max="36" step="1" value="0">
        <div class="ticks"><span>0°</span><span>45°</span><span>90°</span><span>135°</span><span>180°</span></div>
      </div>

      <div class="row">
        <button class="btn icon" id="prev" title="Previous frame">‹</button>
        <button class="btn primary" id="play" style="min-width:104px; justify-content:center;">▶ Play</button>
        <button class="btn icon" id="next" title="Next frame">›</button>
        <div class="seg" role="group" aria-label="Color">
          <button class="y" id="selY" aria-pressed="true">Yellow</button>
          <button class="r" id="selR" aria-pressed="false">Red</button>
        </div>
        <div class="spacer"></div>
        <button class="btn" id="loopBtn" aria-pressed="true" title="Ping-pong / loop">⇄ Ping-pong</button>
      </div>

      <div class="row" style="gap:20px;">
        <div class="field">Speed
          <select id="fps">
            <option value="8">8 fps</option>
            <option value="12">12 fps</option>
            <option value="18" selected>18 fps</option>
            <option value="24">24 fps</option>
            <option value="30">30 fps</option>
          </select>
        </div>
        <div class="field">
          <label class="field" style="cursor:pointer;"><input type="checkbox" id="bgToggle"> White backdrop</label>
        </div>
        <div class="spacer"></div>
        <div class="read">angle <b id="angRead">0°</b></div>
      </div>
    </div>
  </div>

<script>
const N = 37;
const pad = n => String(n).padStart(3,'0');
const colors = {
  yellow: i => `_shared/frames/yellow_${pad(i)}.png`,
  red:    i => `_shared/frames/red_${pad(i)}.png`,
};
const stage = document.getElementById('stage');

// build + preload <img> for each color/frame
const imgs = { yellow:[], red:[] };
for(const c of ['yellow','red']){
  for(let i=0;i<N;i++){
    const im = new Image();
    im.src = colors[c](i);
    im.alt = `${c} frame ${pad(i)}`;
    im.dataset.c = c; im.dataset.i = i;
    stage.appendChild(im);
    imgs[c].push(im);
  }
}

const state = {
  color: localStorage.getItem('pill_color') || 'yellow',
  frame: parseInt(localStorage.getItem('pill_frame')||'0',10) || 0,
  playing:false, dir:1,
  fps:18, pingpong:true,
};

const slider = document.getElementById('slider');
const readout = document.getElementById('readout');
const angRead = document.getElementById('angRead');

function show(){
  for(const c of ['yellow','red']) for(let i=0;i<N;i++) imgs[c][i].classList.toggle('on', c===state.color && i===state.frame);
  slider.value = state.frame;
  const ang = state.frame*5;
  readout.textContent = `frame ${pad(state.frame)} · ${ang}°`;
  angRead.textContent = ang+'°';
  localStorage.setItem('pill_color', state.color);
  localStorage.setItem('pill_frame', state.frame);
}

let acc=0, last=0, raf=0;
function loop(t){
  if(!state.playing){ last=t; raf=requestAnimationFrame(loop); return; }
  if(!last) last=t;
  acc += (t-last)/1000; last=t;
  const spf = 1/state.fps;
  while(acc >= spf){
    acc -= spf;
    let f = state.frame + state.dir;
    if(state.pingpong){
      if(f>N-1){ f=N-2; state.dir=-1; }
      else if(f<0){ f=1; state.dir=1; }
    } else {
      if(f>N-1) f=0;
      else if(f<0) f=N-1;
    }
    state.frame=f;
  }
  show();
  raf=requestAnimationFrame(loop);
}
raf=requestAnimationFrame(loop);

// controls
const playBtn=document.getElementById('play');
function setPlay(p){ state.playing=p; playBtn.textContent = p?'❚❚ Pause':'▶ Play'; playBtn.classList.toggle('primary',!p); last=0; acc=0; }
playBtn.onclick=()=>setPlay(!state.playing);
document.getElementById('prev').onclick=()=>{ setPlay(false); state.frame=Math.max(0,state.frame-1); show(); };
document.getElementById('next').onclick=()=>{ setPlay(false); state.frame=Math.min(N-1,state.frame+1); show(); };
slider.oninput=()=>{ setPlay(false); state.frame=parseInt(slider.value,10); show(); };

const selY=document.getElementById('selY'), selR=document.getElementById('selR');
function setColor(c){ state.color=c; selY.setAttribute('aria-pressed', c==='yellow'); selR.setAttribute('aria-pressed', c==='red'); show(); }
selY.onclick=()=>setColor('yellow'); selR.onclick=()=>setColor('red');

const loopBtn=document.getElementById('loopBtn');
loopBtn.onclick=()=>{ state.pingpong=!state.pingpong; loopBtn.setAttribute('aria-pressed',state.pingpong); loopBtn.textContent = state.pingpong?'⇄ Ping-pong':'↻ Loop'; };

document.getElementById('fps').onchange=e=>{ state.fps=parseInt(e.target.value,10); };
document.getElementById('bgToggle').onchange=e=>{
  stage.style.background = e.target.checked ? '#ffffff' : '';
  stage.style.backgroundSize = e.target.checked ? '' : '28px 28px';
};

document.addEventListener('keydown',e=>{
  if(e.key===' '){ e.preventDefault(); setPlay(!state.playing); }
  else if(e.key==='ArrowRight'){ setPlay(false); state.frame=Math.min(N-1,state.frame+1); show(); }
  else if(e.key==='ArrowLeft'){ setPlay(false); state.frame=Math.max(0,state.frame-1); show(); }
});

setColor(state.color);
show();
</script>
</body>
</html>
